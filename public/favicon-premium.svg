<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#030014;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#grad)" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <text x="50" y="68" font-family="system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">AM</text>
  <circle cx="75" cy="25" r="4" fill="#22d3ee" filter="url(#glow)" />
</svg>
